version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_DB: taskflow_db
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_user -d taskflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Service (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    ports:
      - "8080:8080"
      - "80:80" # Exposed for the frontend container sharing this network namespace
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=taskflow_db
      - DB_USER=taskflow_user
      - DB_PASSWORD=taskflow_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Service (Vue.js + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    network_mode: "service:backend"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
